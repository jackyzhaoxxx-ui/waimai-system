<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0,user-scalable=no,minimal-ui">
    <title>智能客服</title>
    <link rel="icon" href="./../images/favico.ico">
    <!--element-ui 的样式-->
    <link rel="stylesheet" href="../../backend/plugins/element-ui/index.css"/>
    <!-- 引入样式  -->
    <link rel="stylesheet" href="../styles/index.css"/>
    <!--引入 vant 样式-->
    <link rel="stylesheet" href="../styles/vant.min.css"/>
    <!--本页面内容的样式-->
    <style>
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f5f5f5;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            position: relative;
        }
        
        .chat-back {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 10px;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 15px;
            border-radius: 10px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 14px;
            white-space: pre-wrap;
        }
        
        .message.user .message-content {
            background-color: #007bff;
            color: white;
        }
        
        .message.ai .message-content {
            background-color: white;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .message-time {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            text-align: right;
        }
        
        .chat-input-area {
            background-color: white;
            padding: 10px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 14px;
            outline: none;
        }
        
        .chat-input:focus {
            border-color: #007bff;
        }
        
        .chat-send {
            margin-left: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .chat-send:active {
            transform: scale(0.95);
        }
        
        .loading-typing {
            display: inline-block;
        }
        
        .loading-typing span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #999;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }
        
        .loading-typing span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading-typing span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        
        .welcome-message {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }
        
        .quick-questions {
            padding: 10px;
            background-color: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .quick-question-item {
            display: inline-block;
            background-color: #f0f0f0;
            padding: 8px 15px;
            border-radius: 15px;
            margin: 5px;
            font-size: 13px;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-question-item:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>
<body>
<div id="chat" class="chat-container">
    <div class="chat-header">
        <span class="chat-back" @click="goBack">←</span>
        智能客服
    </div>
    
    <div class="chat-messages" ref="messagesContainer">
        <div v-if="messages.length === 0" class="welcome-message">
            您好！我是智能客服助手，有什么可以帮您的吗？
        </div>
        
        <div v-for="(msg, index) in messages" :key="index" 
             :class="['message', msg.type === 'user' ? 'user' : 'ai']">
            <img :src="msg.avatar" class="message-avatar" alt="avatar">
            <div>
                <div class="message-content">{{msg.content}}</div>
                <div class="message-time">{{msg.time}}</div>
            </div>
        </div>
        
        <div v-if="isLoading" class="message ai">
            <img src="../images/logo.png" class="message-avatar" alt="AI">
            <div class="message-content">
                <div class="loading-typing">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="quick-questions" v-if="showQuickQuestions">
        <div class="quick-question-item" v-for="(q, index) in quickQuestions" 
             :key="index" @click="sendQuickQuestion(q)">
            {{q}}
        </div>
    </div>
    
    <div class="chat-input-area">
        <input type="text" 
               v-model="inputMessage" 
               @keyup.enter="sendMessage"
               placeholder="请输入您的问题..." 
               class="chat-input"
               maxlength="500">
        <button @click="sendMessage" class="chat-send" :disabled="isLoading">
            {{isLoading ? '发送中...' : '发送'}}
        </button>
    </div>
</div>

<!-- 开发环境版本，包含了有帮助的命令行警告 -->
<script src="../../backend/plugins/vue/vue.js"></script>
<!-- 引入组件库 -->
<script src="../../backend/plugins/element-ui/index.js"></script>
<!-- 引入 vant 组件 -->
<script src="./../js/vant.min.js"></script>
<!--不同屏幕尺寸根字体设置-->
<script src="./../js/base.js"></script>
<!-- 引入 axios -->
<script src="../../backend/plugins/axios/axios.min.js"></script>
<script src="./../js/request.js"></script>
<script src="./../api/chat.js"></script>

<script>
    new Vue({
        el: "#chat",
        data() {
            return {
                inputMessage: '',
                messages: [],
                isLoading: false,
                sessionId: null,
                userId: null,
                userAvatar: '../images/user.png',
                aiAvatar: '../images/logo.png',
                showQuickQuestions: true,
                quickQuestions: [
                    '配送时间多久？',
                    '配送费怎么算？',
                    '有什么优惠活动？',
                    '如何申请退款？',
                    '推荐几个招牌菜'
                ]
            }
        },
        created() {
            // 从 sessionStorage 获取用户 ID
            const user = sessionStorage.getItem("user")
            this.userId = user ? JSON.parse(user).id : null
            if (!this.userId) {
                // 如果没有用户 ID，跳转到登录页
                window.location.href = '/front/page/login.html'
                return
            }
            if (!this.sessionId) {
                this.sessionId = 'session_' + this.userId + '_' + Date.now();
            }
            // 加载历史聊天记录
            this.loadHistory();
        },
        methods: {
            goBack() {
                history.go(-1);
            },
            
            getCurrentTime() {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                return `${hours}:${minutes}`;
            },
            
            async sendMessage() {
                const message = this.inputMessage.trim();
                if (!message || this.isLoading) return;
                
                // 添加用户消息
                this.messages.push({
                    type: 'user',
                    content: message,
                    time: this.getCurrentTime(),
                    avatar: this.userAvatar
                });
                
                this.inputMessage = '';
                this.isLoading = true;
                this.showQuickQuestions = false;
                this.scrollToBottom();
                
                try {
                    const params = {
                        question: message,
                        sessionId: this.sessionId
                    };
                    
                    const res = await chatSendApi(params);
                    
                    console.log('后端返回的数据:', res);
                    
                    if (res.code === 1) {
                        console.log('AI 回答:', res.data.answer);
                        // 添加 AI 回复
                        this.messages.push({
                            type: 'ai',
                            content: res.data.answer,
                            time: this.getCurrentTime(),
                            avatar: this.aiAvatar
                        });
                    } else {
                        this.$notify({type: 'warning', message: res.msg || '获取回复失败'});
                    }
                } catch (error) {
                    console.error('发送消息失败:', error);
                    this.messages.push({
                        type: 'ai',
                        content: '抱歉，系统出现异常，请稍后再试。',
                        time: this.getCurrentTime(),
                        avatar: this.aiAvatar
                    });
                } finally {
                    this.isLoading = false;
                    this.scrollToBottom();
                }
            },
            
            sendQuickQuestion(question) {
                this.inputMessage = question;
                this.sendMessage();
            },
            
            async loadHistory() {
                try {
                    const res = await chatHistoryApi({sessionId: this.sessionId});
                    if (res.code === 1 && res.data && res.data.length > 0) {
                        res.data.forEach(item => {
                            // 用户消息
                            this.messages.push({
                                type: 'user',
                                content: item.question,
                                time: this.formatTime(item.createTime),
                                avatar: this.userAvatar
                            });
                            // AI 回复
                            this.messages.push({
                                type: 'ai',
                                content: item.answer,
                                time: this.formatTime(item.createTime),
                                avatar: this.aiAvatar
                            });
                        });
                        this.scrollToBottom();
                    }
                } catch (error) {
                    console.error('加载历史记录失败:', error);
                }
            },
            
            formatTime(timeStr) {
                if (!timeStr) return this.getCurrentTime();
                try {
                    const date = new Date(timeStr);
                    const hours = String(date.getHours()).padStart(2, '0');
                    const minutes = String(date.getMinutes()).padStart(2, '0');
                    return `${hours}:${minutes}`;
                } catch (e) {
                    return this.getCurrentTime();
                }
            },
            
            scrollToBottom() {
                this.$nextTick(() => {
                    const container = this.$refs.messagesContainer;
                    if (container) {
                        container.scrollTop = container.scrollHeight;
                    }
                });
            }
        }
    })
</script>
</body>
</html>
